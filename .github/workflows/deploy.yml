name: Update and Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */3 * * *' # Alle 3 Stunden
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        # Retry logic: Falls der Build fehlschlägt, wird er bis zu 3 mal probiert
        run: |
          for i in {1..3}; do
            flutter build web --release --base-href "/${{ github.event.repository.name }}/" && break || sleep 15
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper/scrape.py

      - name: Prepare Deployment Files
        run: |
          mkdir -p build/web/calendars
          cp -r web/calendars/* build/web/calendars/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        # Retry logic für das Deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Retry Deploy if failed
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
