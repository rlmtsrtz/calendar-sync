name: Update and Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *' # Täglich um 4:00 Uhr
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true # Wichtig: Verhindert, dass sich Deployments gegenseitig blockieren

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper/scrape.py

      - name: Prepare Deployment Files
        run: |
          # Kalender in das Build-Verzeichnis kopieren
          mkdir -p build/web/calendars
          cp -r web/calendars/* build/web/calendars/ || true
          # Sicherstellen, dass die Datei vorhanden ist (für Debugging)
          ls -R build/web/calendars

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
