name: Deploy Flutter Web

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * *' # Daily at 4 AM
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
#    permissions:
#      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/tus_dornberg_calendar/"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 icalendar

      - name: Run Scraper
        run: python scraper/scrape.py

      - name: Copy data to build
        run: |
          cp scraper/teams.json build/web/
          # calendars are already generated into web/calendars by scrape.py
          # which flutter build web might include, but let's be safe:
          mkdir -p build/web/calendars
          cp -r web/calendars/* build/web/calendars/ || true

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
